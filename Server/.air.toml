# Air hot-reload config for OwnCord chat server.
# Usage: cd Server && air
# Docs:  https://github.com/air-verse/air

root = "."
tmp_dir = "tmp"

[build]
  bin = "./chatserver.exe"
  cmd = "go build -o chatserver.exe -ldflags \"-s -w\" ."
  delay = 1000
  exclude_dir = ["tmp", "scripts", "migrations", "data", "admin/static"]
  exclude_file = []
  exclude_regex = ["_test\\.go$"]
  exclude_unchanged = false
  follow_symlink = false
  full_bin = ""
  include_dir = []
  include_ext = ["go", "tmpl", "html"]
  include_file = []
  kill_delay = "3s"
  log = "build-errors.log"
  poll = false
  poll_interval = 0
  rerun = false
  rerun_delay = 500
  send_interrupt = true
  stop_on_error = false

[color]
  app = ""
  build = "yellow"
  main = "magenta"
  runner = "green"
  watcher = "cyan"

[log]
  main_only = false
  time = false

[misc]
  clean_on_exit = true

[screen]
  clear_on_rebuild = true
  keep_scroll = true
